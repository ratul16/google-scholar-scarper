name = "scholar-stats"
main = "src/index.js"
compatibility_date = "2024-04-01"

# ── KV namespace ─────────────────────────────────────────────────────────────
# After running `wrangler kv namespace create SCHOLAR_KV` paste the id below.
# For local dev also run: `wrangler kv namespace create SCHOLAR_KV --preview`
[[kv_namespaces]]
binding = "SCHOLAR_KV"
id = "REPLACE_WITH_YOUR_KV_ID"

# ── Cron trigger: once per day at 06:00 UTC ──────────────────────────────────
[triggers]
crons = ["0 6 * * *"]

